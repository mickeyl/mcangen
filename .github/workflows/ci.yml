name: CI

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: rustup update stable && rustup component add clippy
      - run: rustc --version
      - run: cargo check
      - run: cargo clippy -- -D warnings
