<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Transmission origin dot -->
  <circle cx="28" cy="100" r="5" fill="#e94560" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="28" cy="100" r="2.5" fill="#e8e8e8" opacity="0.9"/>

  <!-- Emission lines — frames being generated outward -->
  <line x1="36" y1="94" x2="52" y2="86" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <line x1="36" y1="90" x2="52" y2="80" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="36" y1="106" x2="52" y2="114" stroke="#533483" stroke-width="1.5" opacity="0.4"/>
  <line x1="36" y1="110" x2="52" y2="120" stroke="#533483" stroke-width="1" opacity="0.3"/>
  <line x1="36" y1="98" x2="52" y2="88" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="36" y1="102" x2="52" y2="112" stroke="#533483" stroke-width="1" opacity="0.3"/>

  <!-- CAN bus wires (CAN-H and CAN-L) -->
  <line x1="50" y1="88" x2="220" y2="88" stroke="#0f3460" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="112" x2="220" y2="112" stroke="#0f3460" stroke-width="2" opacity="0.5"/>

  <!-- CAN signal waveform on CAN-H — outgoing generated data -->
  <polyline fill="none" stroke="#e94560" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="50,88 60,88 60,68 78,68 78,88 86,88 86,68 102,68 102,88 110,88 110,68 122,68 122,88 130,88 130,68 146,68 146,88 154,88 154,68 170,68 170,88 178,88 178,68 186,68 186,88 194,88 194,68 210,68 210,88 220,88"/>

  <!-- CAN signal waveform on CAN-L (inverted) -->
  <polyline fill="none" stroke="#533483" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="50,112 60,112 60,132 78,132 78,112 86,112 86,132 102,132 102,112 110,112 110,132 122,132 122,112 130,112 130,132 146,132 146,112 154,112 154,132 170,132 170,112 178,112 178,132 186,132 186,112 194,112 194,132 210,132 210,112 220,112"/>

  <!-- Differential marker -->
  <text x="135" y="160" font-family="monospace" font-size="10" fill="#533483" text-anchor="middle" opacity="0.6">CAN-H / CAN-L</text>

  <!-- Speed/direction arrows — rightward, indicating transmission -->
  <polygon points="218,82 230,88 218,94" fill="#e94560" opacity="0.35"/>
  <polygon points="218,106 230,112 218,118" fill="#533483" opacity="0.35"/>

  <!-- Title -->
  <text x="410" y="82" font-family="monospace" font-weight="bold" font-size="52" fill="#e8e8e8" text-anchor="middle" letter-spacing="-1">mcangen</text>

  <!-- Subtitle -->
  <text x="410" y="112" font-family="monospace" font-size="14" fill="#e94560" text-anchor="middle">HIGH-PERFORMANCE CAN BUS FRAME GENERATOR</text>

  <!-- Frame packet visualization — frames being constructed -->
  <!-- SOF -->
  <rect x="270" y="130" width="8" height="16" rx="2" fill="#e94560" opacity="0.9" filter="url(#glow)"/>
  <!-- ID field -->
  <rect x="282" y="130" width="44" height="16" rx="2" fill="#533483" opacity="0.8"/>
  <text x="304" y="142" font-family="monospace" font-size="8" fill="#e8e8e8" text-anchor="middle">ID</text>
  <!-- DLC -->
  <rect x="330" y="130" width="24" height="16" rx="2" fill="#0f3460" opacity="0.8"/>
  <text x="342" y="142" font-family="monospace" font-size="8" fill="#e8e8e8" text-anchor="middle">DLC</text>
  <!-- Data bytes -->
  <rect x="358" y="130" width="100" height="16" rx="2" fill="#1a6e3a" opacity="0.7"/>
  <text x="408" y="142" font-family="monospace" font-size="8" fill="#e8e8e8" text-anchor="middle">DATA[0..7]</text>
  <!-- CRC -->
  <rect x="462" y="130" width="36" height="16" rx="2" fill="#0f3460" opacity="0.8"/>
  <text x="480" y="142" font-family="monospace" font-size="8" fill="#e8e8e8" text-anchor="middle">CRC</text>
  <!-- EOF -->
  <rect x="502" y="130" width="8" height="16" rx="2" fill="#e94560" opacity="0.9" filter="url(#glow)"/>

  <!-- Repeated fading frames behind — conveying stream of generated frames -->
  <g opacity="0.15">
    <rect x="270" y="152" width="8" height="12" rx="2" fill="#e94560"/>
    <rect x="282" y="152" width="44" height="12" rx="2" fill="#533483"/>
    <rect x="330" y="152" width="24" height="12" rx="2" fill="#0f3460"/>
    <rect x="358" y="152" width="100" height="12" rx="2" fill="#1a6e3a"/>
    <rect x="462" y="152" width="36" height="12" rx="2" fill="#0f3460"/>
    <rect x="502" y="152" width="8" height="12" rx="2" fill="#e94560"/>
  </g>
  <g opacity="0.07">
    <rect x="270" y="168" width="8" height="10" rx="2" fill="#e94560"/>
    <rect x="282" y="168" width="44" height="10" rx="2" fill="#533483"/>
    <rect x="330" y="168" width="24" height="10" rx="2" fill="#0f3460"/>
    <rect x="358" y="168" width="100" height="10" rx="2" fill="#1a6e3a"/>
    <rect x="462" y="168" width="36" height="10" rx="2" fill="#0f3460"/>
    <rect x="502" y="168" width="8" height="10" rx="2" fill="#e94560"/>
  </g>

  <!-- Rust gear accent -->
  <g transform="translate(600, 30) scale(0.4)" fill="#e94560" opacity="0.15">
    <path d="M50,10 L55,25 L70,20 L65,35 L80,40 L65,45 L70,60 L55,55 L50,70 L45,55 L30,60 L35,45 L20,40 L35,35 L30,20 L45,25 Z"/>
    <circle cx="50" cy="40" r="12" fill="url(#bgGrad)"/>
  </g>
</svg>
